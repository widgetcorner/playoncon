name: playoncon
description: "Play On Con — convention companion app."
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  csv: ^6.0.0
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1
  intl: ^0.20.1
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  scrollable_positioned_list: ^0.3.8
  geolocator: ^14.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/poc-logo.png"
  remove_alpha_ios: true
  background_color_ios: "#F0E9D8"
  adaptive_icon_background: "#F0E9D8"
  adaptive_icon_foreground: "assets/branding/poc-logo.png"
  min_sdk_android: 21
